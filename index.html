<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 어린이날 특별 선물</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap');
        body { font-family: 'Gowun Dodum', sans-serif; text-align: center; background-color: #fdfbf0; padding: 20px; color: #3e2723; margin: 0; }
        .header { background: #0277bd; color: white; padding: 20px; border-radius: 0 0 20px 20px; margin: -20px -20px 20px -20px; }
        h1 { font-size: 1.4rem; margin: 0; }
        .badge { background: #ffca28; display: inline-block; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; margin-top: 10px; }
        .instruction { font-size: 0.85rem; color: #d32f2f; font-weight: bold; margin: 20px 0; line-height: 1.4; }
        .item-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #e0d7c6; }
        .item-title { font-weight: bold; margin-bottom: 10px; color: #5d4037; }
        img { width: 100%; max-width: 280px; border-radius: 10px; display: block; margin: 0 auto; }
        .footer { font-size: 0.75rem; color: #9e9e9e; margin-top: 40px; padding-bottom: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎉 해박탐험단 특별 보상</h1>
        <div class="badge">명예 탐험단원 한정판 굿즈</div>
    </div>

    <div class="instruction">
        마음에 드는 배경화면을<br>
        <strong>[길게 꾹~ 눌러서]</strong> 이미지 저장을 눌러주세요!
    </div>

    <div class="image-list">
        <div class="item-card">
            <div class="item-title">#01 도트 항해</div>
            <img src="./images/wallpaper_pixel.png" alt="픽셀아트 배경화면">
        </div>

        <div class="item-card">
            <div class="item-title">#02 해녀</div>
            <img src="./images/wallpaper_haenyeo.png" alt="해녀 해버미 배경화면">
        </div>

        <div class="item-card">
            <div class="item-title">#03 신비로운 박물관의 밤</div>
            <img src="./images/wallpaper_sailing.png" alt="항해">
        </div>
    </div>

    <div class="footer">
        국립해양박물관 2026 어린이날 기념 프로그램<br>
        &copy; NATIONAL MARITIME MUSEUM
    </div>
</body>
</html>
